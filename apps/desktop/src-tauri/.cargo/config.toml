# Miri runs against the helpers extracted to `src/pure_helpers.rs` via
# the sub-crate at `tools/miri-helpers-tests/`. Trigger with
# `bun run test:miri` (or `cd tools/miri-helpers-tests && cargo +nightly
# miri test`).
#
# Why the sub-crate: `cargo +nightly miri test` on the main crate fails
# because `tauri-plugin-mcp-bridge` (transitive) uses the `ctor` macro,
# which Miri's interpreter doesn't model. Same workaround pattern as
# `tools/loom-watcher-tests` for Loom.
#
# Coverage scope: the pure-arithmetic helpers (`interpolate_frame`,
# `ease_out_cubic`) and the path-traversal guard `resolve_within_root`.
# The FS-touching call sites are guarded with `#[cfg_attr(miri, ignore)]`
# inside the sub-crate's tests so Miri only exercises the deterministic
# arithmetic — `std::fs::canonicalize` isn't part of Miri's shim on macOS.
#
# Tests in src/lib.rs that touch the filesystem or rely on real-time
# timing are still guarded with `#[cfg_attr(miri, ignore)]` for the
# case where someone runs Miri on the main crate after solving the
# `ctor` issue upstream — those guards keep them quiet there too.
